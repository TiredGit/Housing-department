services:
  core_db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${CORE_DB_NAME}
      POSTGRES_USER: ${CORE_DB_USER}
      POSTGRES_PASSWORD: ${CORE_DB_PASS}
    ports:
      - "5432:5432"
    volumes:
      - core_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CORE_DB_USER} -d ${CORE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  news_db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${NEWS_DB_NAME}
      POSTGRES_USER: ${NEWS_DB_USER}
      POSTGRES_PASSWORD: ${NEWS_DB_PASS}
    ports:
      - "5433:5432"
    volumes:
      - news_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NEWS_DB_USER} -d ${NEWS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  notifications_db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${NOTIFICATIONS_DB_NAME}
      POSTGRES_USER: ${NOTIFICATIONS_DB_USER}
      POSTGRES_PASSWORD: ${NOTIFICATIONS_DB_PASS}
    ports:
      - "5434:5432"
    volumes:
      - notifications_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${NOTIFICATIONS_DB_USER} -d ${NOTIFICATIONS_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

#  kafka-ui:
#    image: ghcr.io/kafbat/kafka-ui:latest
#    container_name: kafka-ui
#    depends_on:
#      - kafka
#    ports:
#      - "8080:8080"
#    environment:
#      KAFKA_CLUSTERS_0_NAME: local-cluster
#      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
#    restart: unless-stopped

  core_service:
    build:
      context: ./Core_service
    ports:
      - "8001:8001"
    environment:
      DB_HOST: core_db
      DB_PORT: 5432
      DB_USER: ${CORE_DB_USER}
      DB_PASS: ${CORE_DB_PASS}
      DB_NAME: ${CORE_DB_NAME}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_MINUTES: ${REFRESH_TOKEN_EXPIRE_MINUTES}
      CREATE_INITIAL_ADMIN: ${CREATE_INITIAL_ADMIN}
      INITIAL_ADMIN_PHONE: ${INITIAL_ADMIN_PHONE}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME}
    depends_on:
      core_db:
        condition: service_healthy
    restart: unless-stopped

  news_service:
    build:
      context: ./News_service
    ports:
      - "8002:8002"
    environment:
      DB_HOST: news_db
      DB_PORT: 5432
      DB_USER: ${NEWS_DB_USER}
      DB_PASS: ${NEWS_DB_PASS}
      DB_NAME: ${NEWS_DB_NAME}
    depends_on:
      news_db:
        condition: service_healthy
      core_service:
        condition: service_started
    restart: unless-stopped

  notifications_service:
    build:
      context: ./Notifications_service
    ports:
      - "8004:8004"
    environment:
      DB_HOST: notifications_db
      DB_PORT: 5432
      DB_USER: ${NOTIFICATIONS_DB_USER}
      DB_PASS: ${NOTIFICATIONS_DB_PASS}
      DB_NAME: ${NOTIFICATIONS_DB_NAME}

      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_NEWS_CREATED: news.created
      KAFKA_GROUP_ID: notifications-service

      FIREBASE_CREDENTIALS_PATH: ${FIREBASE_CREDENTIALS_PATH}
    depends_on:
      notifications_db:
        condition: service_healthy
      kafka:
        condition: service_started
      core_service:
        condition: service_started
    restart: unless-stopped

  bff:
    build:
      context: ./BFF
    ports:
      - "8000:8000"
    environment:
      CORE_URL: http://core_service:8001
      NEWS_URL: http://news_service:8002
      NOTIFICATIONS_URL: http://notifications_service:8004
    depends_on:
      - core_service
      - news_service
      - notifications_service
    restart: unless-stopped

volumes:
  core_postgres_data:
  news_postgres_data:
  notifications_postgres_data:
  kafka_data: